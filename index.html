<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convert Money</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital@0;1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <img class="coin-flip" src="./assets/coin-flip-45.gif" alt="logo-coin-flip">

    <main>

        <label>
            Converter <b>de</b>:
            <select>
                <option>
                    R$ Real Brasileiro
                </option>
            </select>
        </label>

        <label>
            Converter <b>para</b>:
            <select>
                <option>
                    US$ Dólar Americano
                </option>
                <option>
                    € Euro
                </option>
                <option>
                    £ Libra
                </option>
                <option>
                    Bitcoin
                </option>
            </select>
        </label>

        <label>
            Valor:
            <input class="input-currency" placeholder="R$ 10.000,00">
        </label>

        <button class="convert-button">
            Converter
        </button>

        <section>

                <div class="currency-box">
                    <img src="./assets/real.png" alt="logo-moeda-a-converter">
                    <p class="currency">Real</p>
                    <p class="currency-value-to-convert">R$ 0,00</p>
                </div>
                <div class="arrow-img">
                    <img src="./assets/arrow.png" alt="seta-de-conversao">
                </div>
                <div class="currency-box">
                    <img src="./assets/dolar.png" alt="logo-moeda-convertida">
                    <p class="currency">Dólar</p>
                    <p class="currency-value">US$ 0.0</p>
                </div>

        </section>
    </main>
</body>
<script src="./scripts.js"></script>
</html>
